<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiang Khong Ultra 2026 - Master System</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #6f42c1; --success: #28a745; --danger: #dc3545; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); font-family: 'Prompt', sans-serif; min-height: 100vh; }
        .card { border: none; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); background: rgba(255, 255, 255, 0.95); margin-bottom: 20px; }
        .total-km-box { background: linear-gradient(45deg, #6f42c1, #e91e63); color: white; border-radius: 20px; padding: 15px; text-align: center; }
        #reader { width: 100%; min-height: 280px; background: #000; border-radius: 15px; overflow: hidden; }
        .btn-checkpoint { height: 65px; font-size: 1.1rem; font-weight: 600; border-radius: 15px; display: none; margin-bottom: 8px; }
        .history-card { border-radius: 12px; border: 1px solid #eee; background: #fff; padding: 10px; margin-bottom: 8px; font-size: 0.85rem; }
        .cert-btn { display: none; margin-top: 10px; font-weight: 600; border-radius: 12px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .status-badge { padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
<div id="loading" class="loading-overlay"><div class="spinner-border text-primary"></div></div>
<div class="container py-3">
    <div class="text-center mb-3">
        <button id="voiceBtn" class="btn btn-outline-primary btn-sm rounded-pill px-4" onclick="unlockAudio()">🔊 เปิดระบบเสียงแจ้งเตือน</button>
    </div>
    
    <ul class="nav nav-pills nav-fill mb-3 bg-white p-1 rounded-pill shadow-sm" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-reg">1.ลงทะเบียน</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-run">2.สแกนจุด</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-stat" onclick="fetchDataFromCloud()">3.อันดับ</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-me">4.ฉัน</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-reg">
            <div class="card p-4 mx-auto" style="max-width: 400px;">
                <h6 class="fw-bold text-center text-primary mb-3">ลงทะเบียน Ultra 104 #8</h6>
                <form id="regForm">
                    <div class="mb-3"><label class="small">เลข BIB</label><input type="text" id="regBib" class="form-control" required></div>
                    <div class="mb-3"><label class="small">ชื่อ-นามสกุล</label><input type="text" id="regName" class="form-control" required></div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="small">เพศ</label>
                            <select id="regGender" class="form-select" required>
                                <option value="M">ชาย</option>
                                <option value="F">หญิง</option>
                            </select>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="small">ประเภท</label>
                            <select id="regCategory" class="form-select" required>
                                <option value="Solo">เดี่ยว</option>
                                <option value="Couple">ผลัด 2</option>
                                <option value="Team3">ผลัด 3</option>
                                <option value="Team10">ผลัด 10</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">บันทึกลงทะเบียน</button>
                </form>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-run">
            <div class="card p-3 mx-auto" style="max-width: 500px;">
                <input type="text" id="scanBib" class="form-control text-center mb-3 border-primary fw-bold" placeholder="ระบุ BIB">
                <div id="reader" class="mb-3"></div>
                <div class="d-grid gap-2 mb-3">
                    <button id="startScanBtn" class="btn btn-dark btn-sm rounded-pill" onclick="startScanner()">📸 เปิดกล้อง</button>
                    <button id="stopScanBtn" class="btn btn-outline-danger btn-sm rounded-pill" onclick="stopScanner()" style="display:none;">ปิดกล้อง</button>
                </div>
                <div id="btnArea" class="d-grid gap-2" style="display:none;">
                    <button id="btnStart" class="btn btn-dark p-3 fw-bold btn-checkpoint" onclick="checkPoint('Start')">🚩 Start (กม.0)</button>
                    <button id="btnCP1" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP1')">📍 CP-1 (กม.7)</button>
                    <button id="btnCP2" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP2')">📍 CP-2 (กม.56)</button>
                    <button id="btnCP3" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP3')">📍 CP-3 (กม.72)</button>
                    <button id="btnCP4" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP4')">📍 CP-4 (กม.89)</button>
                    <button id="btnCP5" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP5')">📍 CP-5 (กม.103)</button>
                    <button id="btnCP6" class="btn btn-danger p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP6')">🏁 Finish (กม.104)</button>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-stat">
            <div class="card p-3 mx-auto" style="max-width: 600px;">
                <div class="total-km-box mb-3">
                    <small>รวมระยะทางผู้ร่วมงานทั้งหมด</small>
                    <h2 class="fw-bold"><span id="grandTotalKm">0.00</span> กม.</h2>
                </div>
                <div id="rankingContent">คลิก "อันดับ" เพื่อโหลดข้อมูล</div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-me">
            <div class="card p-3 mx-auto text-center" style="max-width: 500px;">
                <div class="input-group mb-3">
                    <input type="text" id="myBibSearch" class="form-control text-center fw-bold" placeholder="ระบุ BIB">
                    <button class="btn btn-primary" onclick="loadMyStats()">ดูผลงาน</button>
                </div>
                <div id="myResultArea" style="display:none;">
                    <h4 id="myNameDisplay" class="fw-bold text-primary">-</h4>
                    <div id="myStatusBadge" class="mb-2"></div>
                    <div id="myMedalDisplay" style="font-size:3rem;">🏃‍♂️</div>
                    <div id="myTimeMsg" class="small fw-bold text-muted mb-3"></div>
                    <div class="progress" style="height:25px; border-radius:15px;">
                        <div id="myProgressBar" class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                    </div>
                    <div class="small mt-1"><span id="myDistDisplay">0.00</span> / 104 กม.</div>
                    <div id="myHistoryList" class="text-start mt-3"></div>
                    <a id="btnCertGold" href="#" class="btn btn-warning cert-btn w-100">🏆 พิมพ์ใบประกาศ Finisher</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyA2rMlXRgXSs_Zx3recKiuZ06QfbhnH5jG4eNUYRMC5Ff3qH90c5Cp0ia4P89Sr8yS/exec";
    const distances = { 'Start': 0, 'CP1': 7, 'CP2': 56, 'CP3': 72, 'CP4': 89, 'CP5': 103, 'CP6': 104 };
    const pointNames = { 'Start': 'จุด Start', 'CP1': 'CP-1', 'CP2': 'CP-2', 'CP3': 'CP-3', 'CP4': 'CP-4', 'CP5': 'CP-5', 'CP6': 'Finish (กม.104)' };
    
    const LIMIT_HOURS = 24;
    const REQUIRED_POINTS = ['Start', 'CP1', 'CP2', 'CP3', 'CP4', 'CP5', 'CP6'];

    let html5QrCode;

    // ระบบสแกน
    async function startScanner() {
        try {
            const cams = await Html5Qrcode.getCameras();
            if (cams.length > 0) {
                document.getElementById('startScanBtn').style.display = 'none';
                document.getElementById('stopScanBtn').style.display = 'block';
                if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                    try {
                        const url = new URL(text); const p = url.searchParams.get("point");
                        if (p && pointNames[p]) { speak("พบจุด " + pointNames[p]); handleScannedPoint(p); stopScanner(); }
                    } catch(e) {}
                });
            }
        } catch (err) { alert("กล้องมีปัญหา: " + err); }
    }

    function stopScanner() { if (html5QrCode?.isScanning) html5QrCode.stop().then(() => { document.getElementById('startScanBtn').style.display = 'block'; document.getElementById('stopScanBtn').style.display = 'none'; }); }
    
    function handleScannedPoint(p) { 
        document.getElementById('btnArea').style.display = 'grid';
        document.querySelectorAll('.btn-checkpoint').forEach(b => b.style.display = 'none'); 
        document.getElementById('btn' + p).style.display = 'block'; 
    }

    // ลงทะเบียน
    document.getElementById('regForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            action: 'register',
            bib: document.getElementById('regBib').value.trim(),
            name: document.getElementById('regName').value.trim(),
            gender: document.getElementById('regGender').value,
            category: document.getElementById('regCategory').value
        };
        showLoading(true);
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        speak("ลงทะเบียนสำเร็จค่ะ");
        showLoading(false);
    };

    // บันทึกจุดสแกน
    async function checkPoint(code) {
        const bib = document.getElementById('scanBib').value.trim();
        if(!bib) return alert('ระบุ BIB');
        showLoading(true);
        const data = { action: 'record', bib: bib, end: code, distance: distances[code] };
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        speak("บันทึกจุด " + pointNames[code] + " สำเร็จ");
        showLoading(false);
    }

    // ดูผลงานส่วนตัว + ตรวจเงื่อนไข 24 ชม. และสแกนครบจุด
    async function loadMyStats() {
        const bib = document.getElementById('myBibSearch').value.trim();
        if(!bib) return;
        showLoading(true);
        try {
            const res = await fetch(SCRIPT_URL);
            const rows = await res.json();
            const myRows = rows.slice(1).filter(r => String(r[2]).trim() === bib);
            
            if(myRows.length > 0) {
                let name = myRows[0][3];
                let history = myRows.filter(r => r[1] === 'RUN');
                let points = history.map(h => h[7]);
                let totalDist = Math.max(...history.map(h => parseFloat(h[5] || 0)), 0);
                
                let startRow = history.find(h => h[7] === 'Start');
                let finishRow = history.find(h => h[7] === 'CP6');
                
                let timeMsg = "สถานะ: กำลังแข่งขัน";
                let statusHtml = '<span class="status-badge bg-primary text-white">ON TRACK</span>';
                
                if (startRow && finishRow) {
                    let diffMs = new Date(finishRow[0]) - new Date(startRow[0]);
                    let hours = diffMs / (1000 * 60 * 60);
                    let allPointsOk = REQUIRED_POINTS.every(p => points.includes(p));
                    
                    if (hours <= LIMIT_HOURS && allPointsOk) {
                        statusHtml = '<span class="status-badge bg-success text-white">OFFICIAL FINISHER</span>';
                        timeMsg = `เวลาสุทธิ: ${hours.toFixed(2)} ชม.`;
                        document.getElementById('btnCertGold').style.display = 'block';
                    } else {
                        statusHtml = '<span class="status-badge bg-danger text-white">DNF / OVERTIME</span>';
                        timeMsg = hours > LIMIT_HOURS ? "เกินเวลา 24 ชม." : "สแกนจุดไม่ครบ";
                    }
                }

                document.getElementById('myNameDisplay').innerText = name;
                document.getElementById('myStatusBadge').innerHTML = statusHtml;
                document.getElementById('myTimeMsg').innerText = timeMsg;
                document.getElementById('myDistDisplay').innerText = totalDist.toFixed(2);
                document.getElementById('myProgressBar').style.width = (totalDist/104*100) + '%';
                document.getElementById('myResultArea').style.display = 'block';
            }
        } catch(e) { alert("เกิดข้อผิดพลาด"); }
        showLoading(false);
    }

    function unlockAudio() { const m = new SpeechSynthesisUtterance('ระบบพร้อมทำงานค่ะ'); m.lang = 'th-TH'; window.speechSynthesis.speak(m); }
    function speak(t) { if ('speechSynthesis' in window) { const m = new SpeechSynthesisUtterance(t); m.lang = 'th-TH'; window.speechSynthesis.speak(m); } }
    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
</script>
</body>
</html>
