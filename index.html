<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiang Khong Ultra 2026 - Master System</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #6f42c1; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); font-family: 'Prompt', sans-serif; min-height: 100vh; }
        .card { border: none; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); background: rgba(255, 255, 255, 0.95); margin-bottom: 20px; }
        .total-km-box { background: linear-gradient(45deg, #6f42c1, #e91e63); color: white; border-radius: 20px; padding: 15px; text-align: center; }
        #reader { width: 100%; min-height: 280px; background: #000; border-radius: 15px; overflow: hidden; }
        .btn-checkpoint { height: 65px; font-size: 1.1rem; font-weight: 600; border-radius: 15px; display: none; margin-bottom: 8px; }
        .history-card { border-radius: 12px; border: 1px solid #eee; background: #fff; padding: 10px; margin-bottom: 8px; font-size: 0.85rem; }
        .cert-btn { display: none; margin-top: 10px; font-weight: 600; border-radius: 12px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .ranking-filter { cursor: pointer; border-radius: 15px; padding: 8px 15px; font-size: 0.85rem; transition: 0.3s; margin: 2px; }
        .ranking-filter.active { background-color: var(--primary); color: white; }
    </style>
</head>
<body>
<div id="loading" class="loading-overlay"><div class="spinner-border text-primary"></div></div>
<div class="container py-3">
    <div class="text-center mb-3">
        <button id="voiceBtn" class="btn btn-outline-primary btn-sm rounded-pill px-4" onclick="unlockAudio()">🔊 เปิดระบบเสียงทักทาย</button>
    </div>
    
    <ul class="nav nav-pills nav-fill mb-3 bg-white p-1 rounded-pill shadow-sm" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-reg">1.ลงทะเบียน</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-run">2.สแกนจุด</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-stat" onclick="fetchDataFromCloud()">3.อันดับ</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-me">4.ฉัน</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-reg">
            <div class="card p-4 mx-auto" style="max-width: 400px;">
                <h6 class="fw-bold text-center text-primary mb-3">ลงทะเบียน Chiang Khong Ultra #8</h6>
                <form id="regForm">
                    <div class="mb-3"><label class="small">เลข BIB</label><input type="text" id="regBib" class="form-control" required></div>
                    <div class="mb-3"><label class="small">ชื่อ-นามสกุล</label><input type="text" id="regName" class="form-control" required></div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="small">เพศ</label>
                            <select id="regGender" class="form-select" required>
                                <option value="M">ชาย</option>
                                <option value="F">หญิง</option>
                            </select>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="small">ประเภทนักวิ่ง</label>
                            <select id="regCategory" class="form-select" required>
                                <option value="Solo">เดี่ยว</option>
                                <option value="Couple">ผลัด 2</option>
                                <option value="Team3">ผลัด 3</option>
                                <option value="Team10">ผลัด 10</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">บันทึกลงทะเบียน</button>
                </form>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-run">
            <div class="card p-3 mx-auto" style="max-width: 500px;">
                <input type="text" id="scanBib" class="form-control text-center mb-3 border-primary fw-bold" placeholder="ระบุ BIB">
                <div id="reader" class="mb-3"></div>
                <div class="d-grid gap-2 mb-3">
                    <button id="startScanBtn" class="btn btn-dark btn-sm rounded-pill" onclick="startScanner()">📸 เปิดกล้องสแกนจุด</button>
                    <button id="stopScanBtn" class="btn btn-outline-danger btn-sm rounded-pill" onclick="stopScanner()" style="display:none;">ปิดกล้อง</button>
                </div>
                <div id="scanStatus" class="alert alert-light text-center py-2 border rounded-4 small">พร้อมเช็คอิน...</div>
                <div id="btnArea" class="d-grid gap-2" style="display:none;">
                    <button id="btnStart" class="btn btn-dark p-3 fw-bold btn-checkpoint" onclick="checkPoint('Start')">🚩 Check-in: จุด Start</button>
                    <button id="btnCP1" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP1')">📍 CP-1 (กม.7)</button>
                    <button id="btnCP2" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP2')">📍 CP-2 (กม.56)</button>
                    <button id="btnCP3" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP3')">📍 CP-3 (กม.72)</button>
                    <button id="btnCP4" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP4')">📍 CP-4 (กม.89)</button>
                    <button id="btnCP5" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP5')">📍 CP-5 (กม.103)</button>
                    <button id="btnCP6" class="btn btn-danger p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP6')">🏁 CP-6 Finish (104 กม.)</button>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-stat">
            <div class="card p-3 mx-auto" style="max-width: 600px;">
                <div class="total-km-box mb-3">
                    <small>ระยะทางรวมสะสมของทุกคน</small>
                    <h2 class="fw-bold"><span id="grandTotalKm">0.00</span> กม.</h2>
                </div>
                
                <div class="d-flex flex-wrap justify-content-center mb-3">
                    <div class="ranking-filter border active" onclick="setRankingFilter('All', this)">ทั้งหมด</div>
                    <div class="ranking-filter border" onclick="setRankingFilter('Solo-M', this)">ชายเดี่ยว</div>
                    <div class="ranking-filter border" onclick="setRankingFilter('Solo-F', this)">หญิงเดี่ยว</div>
                    <div class="ranking-filter border" onclick="setRankingFilter('Couple', this)">ผลัด 2</div>
                    <div class="ranking-filter border" onclick="setRankingFilter('Team3', this)">ผลัด 3</div>
                    <div class="ranking-filter border" onclick="setRankingFilter('Team10', this)">ผลัด 10</div>
                </div>

                <h6 class="fw-bold mb-3" id="rankingTitle">🏆 อันดับนักวิ่ง</h6>
                <div class="table-responsive">
                    <table class="table table-sm table-hover">
                        <thead class="table-light"><tr><th>#</th><th>BIB</th><th>ชื่อ</th><th class="text-end">กม.</th></tr></thead>
                        <tbody id="top10Body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-me">
            <div class="card p-3 mx-auto text-center" style="max-width: 500px;">
                <div class="input-group mb-3">
                    <input type="text" id="myBibSearch" class="form-control text-center fw-bold" placeholder="ใส่ BIB ของคุณ">
                    <button class="btn btn-primary" onclick="loadMyStats()">ดูสถิติ</button>
                </div>
                <div id="myResultArea" style="display:none;">
                    <h4 id="myNameDisplay" class="fw-bold text-primary">-</h4>
                    <div id="myMedalDisplay" style="font-size:3rem;">🏃‍♂️</div>
                    <div id="certArea" class="mt-2">
                        <a id="btnCertBronze" href="#" class="btn btn-secondary cert-btn w-100">📜 เกียรติบัตร 20 กม.</a>
                        <a id="btnCertGold" href="#" class="btn btn-warning cert-btn w-100">🏆 FINISHER 104 กม.</a>
                    </div>
                    <div class="progress mt-4" style="height:20px; border-radius:10px;">
                        <div id="myProgressBar" class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                    </div>
                    <div class="small text-muted mt-1"><span id="myDistDisplay">0.00</span> / 104 กม.</div>
                    <div id="myHistoryList" class="text-start mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPRneaWHMv5_nzltNGDLcIbIWfLPsuRocMl4wBBJme8EWY2G1haPyUMRs-Qj92hYg9IQ/exec";
    const distances = { 'Start': 0, 'CP1': 7, 'CP2': 56, 'CP3': 72, 'CP4': 89, 'CP5': 103, 'CP6': 104 };
    const pointNames = { 'Start': 'พิพิธภัณฑ์ศิลปะร่วมสมัย', 'CP1': 'หน้าบิ๊กซีสนามบิน', 'CP2': 'รพ.สต.บ้านแซว', 'CP3': 'รพ.สต.บ้านไร่', 'CP4': 'จุดชมวิวห้วยทรายมาน', 'CP5': 'วัดหาดไคร้', 'CP6': 'ศาลา 104 ระเบียงโขง' };
    
    let html5QrCode, activeSession = null;
    let currentFilter = 'All';
    let globalData = [];

    // ระบบจัดการจุดสแกนเหมือนเดิม
    async function startScanner() {
        try {
            const cams = await Html5Qrcode.getCameras();
            if (cams.length > 0) {
                document.getElementById('startScanBtn').style.display = 'none';
                document.getElementById('stopScanBtn').style.display = 'block';
                if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                    try {
                        const url = new URL(text); const p = url.searchParams.get("point");
                        if (p && pointNames[p]) { speak("พบจุด " + pointNames[p]); handleScannedPoint(p); stopScanner(); }
                    } catch(e) {}
                });
            }
        } catch (err) { alert("กล้องมีปัญหา: " + err); }
    }

    function stopScanner() { if (html5QrCode?.isScanning) html5QrCode.stop().then(() => { document.getElementById('startScanBtn').style.display = 'block'; document.getElementById('stopScanBtn').style.display = 'none'; }); }
    
    function handleScannedPoint(p) { 
        document.getElementById('btnArea').style.display = 'grid';
        document.querySelectorAll('.btn-checkpoint').forEach(b => b.style.display = 'none'); 
        document.getElementById('btn' + p).style.display = 'block'; 
    }

    async function checkPoint(code) {
        const bib = document.getElementById('scanBib').value.trim(); if(!bib) return alert('ระบุ BIB');
        showLoading(true);
        try {
            const res = await fetch(SCRIPT_URL); const rows = await res.json();
            const runner = rows.slice(1).find(r => String(r[2]).trim() === bib);
            const name = runner ? runner[3] : 'นักวิ่ง';
            const now = new Date();
            
            if(!activeSession) {
                activeSession = { start: code, bib: bib, startTime: now.toISOString() };
                speak("เริ่มจากจุด " + pointNames[code] + " คุณ " + name);
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'record', bib: bib, name: name, start: code, end: code, distance: 0 }) });
            } else {
                const dist = Math.abs(distances[code] - distances[activeSession.start]);
                if(dist === 0) { showLoading(false); return speak("อยู่ที่เดิมค่ะ"); }
                speak("ถึงจุด " + pointNames[code] + " ระยะ " + dist + " กม. เก่งมากคุณ " + name);
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'record', bib: bib, name: name, start: activeSession.start, end: code, distance: dist, startTime: activeSession.startTime }) });
                activeSession = { start: code, bib: bib, startTime: now.toISOString() };
            }
        } catch(e) {}
        showLoading(false);
    }

    // ลงทะเบียนส่ง เพศ และ ประเภท ไปด้วย
    document.getElementById('regForm').onsubmit = async (e) => {
        e.preventDefault(); 
        const bib = document.getElementById('regBib').value.trim(); 
        const name = document.getElementById('regName').value.trim();
        const gender = document.getElementById('regGender').value;
        const category = document.getElementById('regCategory').value;
        showLoading(true);
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
                action: 'register', bib: bib, name: name, category: category, gender: gender 
            })});
            document.getElementById('scanBib').value = bib; speak("ลงทะเบียนสำเร็จค่ะ");
            bootstrap.Tab.getOrCreateInstance(document.querySelector('button[data-bs-target="#tab-run"]')).show();
        } catch(e) { alert("เกิดข้อผิดพลาด"); } showLoading(false);
    };

    // ระบบจัดอันดับแบบกรองข้อมูล
    function setRankingFilter(filter, el) {
        currentFilter = filter;
        document.querySelectorAll('.ranking-filter').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        renderRanking();
    }

    async function fetchDataFromCloud() {
        showLoading(true);
        try {
            const res = await fetch(SCRIPT_URL); 
            globalData = await res.json();
            renderRanking();
        } catch(e) {} showLoading(false);
    }

    function renderRanking() {
        let summary = {}, info = {}, grandTotal = 0;
        const rows = globalData.slice(1);
        
        // รวบรวมข้อมูลพื้นฐานนักวิ่งจากแถว REG
        rows.forEach(r => {
            const bib = String(r[2]).trim();
            if(r[1] === 'REG') {
                info[bib] = { name: r[3], cat: r[8], gen: r[9] }; // Column I=Category, J=Gender
            }
        });

        // คำนวณระยะทางจากแถว RUN
        rows.forEach(r => {
            if(r[1] === 'RUN') {
                const bib = String(r[2]).trim();
                const d = parseFloat(r[5] || 0);
                summary[bib] = (summary[bib] || 0) + d;
                grandTotal += d;
            }
        });

        document.getElementById('grandTotalKm').innerText = grandTotal.toFixed(2);

        // กรองข้อมูลตาม Filter
        let sorted = Object.entries(summary).filter(([bib, d]) => {
            if (currentFilter === 'All') return true;
            const runner = info[bib];
            if (!runner) return false;
            if (currentFilter === 'Solo-M') return runner.cat === 'Solo' && runner.gen === 'M';
            if (currentFilter === 'Solo-F') return runner.cat === 'Solo' && runner.gen === 'F';
            return runner.cat === currentFilter;
        });

        // เรียงลำดับจากระยะทางมากไปน้อย (ถ้าเท่ากันให้ดูเวลาเข้าเส้นชัย)
        sorted.sort((a,b) => b[1] - a[1]);
        
        // แสดงผล 1-3 หรือ 1-20
        const displayRows = sorted.slice(0, 20);
        document.getElementById('top10Body').innerHTML = displayRows.map(([bib, d], i) => {
            let trophy = i < 3 ? ['🥇','🥈','🥉'][i] : (i+1);
            return `<tr><td>${trophy}</td><td>${bib}</td><td>${info[bib]?.name || 'นักวิ่ง'}</td><td class="text-end fw-bold">${d.toFixed(2)}</td></tr>`;
        }).join('');
    }

    async function loadMyStats() {
        const inputBib = document.getElementById('myBibSearch').value.trim(); if(!inputBib) return;
        showLoading(true);
        try {
            const res = await fetch(SCRIPT_URL); const rows = await res.json();
            let totalDist = 0, name = "นักวิ่ง", histArray = [];
            const myRows = rows.slice(1).filter(r => String(r[2]).trim() === inputBib);
            if(myRows.length > 0) {
                const regRow = myRows.find(r => r[1] === 'REG');
                name = regRow ? regRow[3] : 'นักวิ่ง';
                myRows.forEach(r => {
                    if(r[1] === 'RUN') {
                        const dist = parseFloat(r[5] || 0); totalDist += dist;
                        histArray.unshift(`<div class="history-card shadow-sm border-start border-primary border-4">📅 ${new Date(r[0]).toLocaleTimeString('th-TH')} | 📍 ${pointNames[r[7]] || r[7]} <span class="text-success fw-bold">+${dist.toFixed(2)} กม.</span></div>`);
                    }
                });
                document.getElementById('myNameDisplay').innerText = name;
                document.getElementById('myDistDisplay').innerText = totalDist.toFixed(2);
                document.getElementById('myProgressBar').style.width = Math.min((totalDist / 104) * 100, 100) + '%';
                document.getElementById('myHistoryList').innerHTML = histArray.join('');
                document.getElementById('myResultArea').style.display = 'block';
                document.querySelectorAll('.cert-btn').forEach(b => b.style.display = 'none');
                if (totalDist >= 104) { document.getElementById('myMedalDisplay').innerHTML = "🥇🏆🎆"; document.getElementById('btnCertGold').style.display = 'block'; speak("ยินดีด้วยผู้พิชิต 104 กิโลเมตร!"); }
                else if (totalDist >= 20) { document.getElementById('btnCertBronze').style.display = 'block'; }
            } else { alert("ไม่พบข้อมูล BIB"); }
        } catch(e) {} showLoading(false);
    }

    function unlockAudio() { const m = new SpeechSynthesisUtterance('ระบบเสียงพร้อมแล้วค่ะ'); m.lang = 'th-TH'; window.speechSynthesis.speak(m); }
    function speak(t) { if ('speechSynthesis' in window) { const m = new SpeechSynthesisUtterance(t); m.lang = 'th-TH'; window.speechSynthesis.speak(m); } }
    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
</script>
</body>
</html>
