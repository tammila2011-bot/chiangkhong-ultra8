<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA 104 #8 - CHIANG KHONG</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #8e6d31; --primary-light: #b59451; --dark-bg: #000; --card-bg: rgba(255,255,255,0.05); }
        body { background-color: var(--dark-bg); color: #eee; font-family: 'Prompt', sans-serif; min-height: 100vh; padding-bottom: 100px; margin: 0; }
        .main-header { background: #000; padding: 0; border-bottom: 3px solid var(--primary); overflow: hidden; line-height: 0; cursor: pointer; }
        .logo-img { width: 100%; height: auto; display: block; filter: brightness(1.1) contrast(1.1); }
        .nav-pills .nav-link { color: #aaa; border-radius: 50px; font-size: 0.85rem; }
        .nav-pills .nav-link.active { background-color: var(--primary); color: #000; font-weight: 600; }
        .card { border: 1px solid #333; border-radius: 20px; background: var(--card-bg); margin-bottom: 15px; backdrop-filter: blur(10px); }
        .bottom-dashboard { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 15, 15, 0.95); border-top: 2px solid var(--primary); padding: 10px 0; z-index: 1000; }
        .btn-dash-sm { background: transparent; border: none; color: #888; text-align: center; font-size: 0.7rem; width: 100%; }
        .btn-dash-sm i { font-size: 1.4rem; display: block; margin-bottom: 2px; }
        .btn-dash-sm.active, .btn-dash-sm:hover { color: var(--primary-light); }
        .btn-sos { color: #ff4444 !important; }
        #reader { width: 100%; border-radius: 15px; border: 2px solid var(--primary); overflow: hidden; background: #111; }
        .btn-checkpoint { height: 60px; font-weight: 600; border-radius: 15px; transition: 0.3s; }
        #loading { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; display:none; justify-content:center; align-items:center; }
        .btn-pulse { animation: pulse-green 2s infinite; border: 2px solid #fff !important; transform: scale(1.02); }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(40, 167, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); } }
        .rank-1 { background: linear-gradient(90deg, rgba(255,215,0,0.1), transparent) !important; border-left: 5px solid #ffd700 !important; }
    </style>
</head>
<body>

<div id="loading"><div class="spinner-border text-primary"></div></div>

<header class="main-header" onclick="handleLogoClick()">
    <img src="loco.png" alt="ULTRA 104" class="logo-img">
</header>

<div class="container mt-3">
    <div class="text-center mb-3">
        <div style="background: rgba(142, 109, 49, 0.1); border: 1px solid var(--primary); border-radius: 50px; padding: 5px 15px; display: inline-flex; align-items:center; gap: 10px;">
            <span class="small fw-bold">🎵 104 Song</span>
            <button class="btn btn-sm btn-primary rounded-circle" onclick="toggleMusic()"><i id="playIcon" class="bi bi-play-fill"></i></button>
            <audio id="bgMusic" src="104 song.mp3" loop></audio>
        </div>
    </div>

    <ul class="nav nav-pills nav-fill mb-3 bg-dark p-1 rounded-pill shadow" id="mainTab">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-scan">สแกนจุด</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-reg">ลงทะเบียน</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-stat" onclick="loadRanking()">อันดับ</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-me">ผลงาน</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-scan">
            <div class="card p-3 shadow-lg">
                <div id="scanStep1">
                    <div class="input-group mb-3">
                        <input type="text" id="scanBib" class="form-control form-control-lg text-center fw-bold bg-dark text-white border-secondary" placeholder="ระบุเลข BIB">
                        <button class="btn btn-warning fw-bold px-4" onclick="verifyStep1()">🔍 ตรวจสอบ</button>
                    </div>
                    <div id="reader"></div>
                </div>

                <div id="scanStep2" style="display:none;" class="text-center py-4">
                    <h2 class="text-primary fw-bold mb-1" id="confirmName">---</h2>
                    <span class="badge bg-secondary mb-3 fs-6" id="confirmBibDisplay">BIB: ---</span>
                    <div id="runnerHistory" class="text-start mb-4"></div>
                    <div class="d-grid gap-3">
                        <button class="btn btn-success btn-lg fw-bold py-3 rounded-4" onclick="unlockCPButtons()">✅ ยืนยันข้อมูลถูกต้อง</button>
                        <button class="btn btn-outline-danger btn-sm border-0" onclick="cancelVerify()">❌ ยกเลิก</button>
                    </div>
                </div>

                <div id="scanStep3" style="display:none;">
                    <div class="alert alert-warning py-2 small text-center fw-bold mb-3">เป้าหมายต่อไปของคุณ: <span id="activeRunnerName"></span></div>
                    <div class="d-grid gap-2" id="btnArea">
                        <button class="btn btn-dark btn-checkpoint" onclick="scanCP('Start', 0)">🚩 Start (กม.0)</button>
                        <button class="btn btn-success btn-checkpoint" onclick="scanCP('CP1', 7)">📍 CP-1 (กม.7)</button>
                        <button class="btn btn-success btn-checkpoint" onclick="scanCP('CP2', 56)">📍 CP-2 (กม.56)</button>
                        <button class="btn btn-success btn-checkpoint" onclick="scanCP('CP3', 72)">📍 CP-3 (กม.72)</button>
                        <button class="btn btn-success btn-checkpoint" onclick="scanCP('CP4', 89)">📍 CP-4 (กม.89)</button>
                        <button class="btn btn-success btn-checkpoint" onclick="scanCP('CP5', 103)">📍 CP-5 (กม.103)</button>
                        <button class="btn btn-danger btn-checkpoint" onclick="scanCP('CP6', 104)">🏁 Finish (กม.104)</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-reg">
            <div class="card p-4">
                <h5 class="fw-bold mb-4 text-primary">ลงทะเบียนนักวิ่ง</h5>
                <form id="regForm" onsubmit="return false;">
                    <div class="mb-3"><label class="small text-muted">BIB</label><input type="text" id="regBib" class="form-control" required></div>
                    <div class="mb-3"><label class="small text-muted">ชื่อ-นามสกุล</label><input type="text" id="regName" class="form-control" required></div>
                    <div class="row g-2 mb-4">
                        <div class="col-6"><label class="small text-muted">เพศ</label><select id="regGender" class="form-select"><option value="M">ชาย</option><option value="F">หญิง</option></select></div>
                        <div class="col-6"><label class="small text-muted">ประเภท</label><select id="regCategory" class="form-select"><option value="Solo">เดี่ยว</option><option value="Couple">ผลัด 2</option><option value="Team3">ผลัด 3</option><option value="Team10">ผลัด 10</option></select></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-3">ลงทะเบียน</button>
                </form>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-stat">
            <div class="card p-3">
                <div class="d-flex justify-content-between mb-3"><h6>อันดับ Live</h6><button class="btn btn-sm btn-outline-warning" onclick="loadRanking()">🔄 รีเฟรช</button></div>
                <div class="table-responsive"><table class="table table-dark small"><thead><tr><th>#</th><th>BIB</th><th>ชื่อ</th><th class="text-end">ระยะ</th></tr></thead><tbody id="rankingBody"></tbody></table></div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-me">
            <div class="card p-3 text-center">
                <h6>ตรวจสอบสถิติส่วนตัวได้ที่หน้าสแกนจุด</h6>
                <p class="small text-muted">กรอก BIB เพื่อดูประวัติการวิ่งย้อนหลัง</p>
            </div>
        </div>
    </div>
</div>

<div class="bottom-dashboard">
    <div class="container"><div class="row text-center">
        <div class="col-3"><button class="btn-dash-sm" onclick="showNews()"><i class="bi bi-megaphone"></i>ข่าวสาร</button></div>
        <div class="col-3"><button class="btn-dash-sm" data-bs-toggle="modal" data-bs-target="#staffModal"><i class="bi bi-people"></i>ทีมงาน</button></div>
        <div class="col-3"><button class="btn-dash-sm btn-sos" data-bs-toggle="modal" data-bs-target="#sosModal"><i class="bi bi-heart-pulse"></i>SOS</button></div>
        <div class="col-3"><button class="btn-dash-sm" onclick="unlockVoice()"><i class="bi bi-volume-up"></i>เสียง AI</button></div>
    </div></div>
</div>

<div class="modal fade" id="newsModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered modal-sm"><div class="modal-content bg-dark text-white border-primary"><div class="modal-body text-center p-4"><i class="bi bi-megaphone-fill text-warning fs-1"></i><h6 class="mt-3" id="newsContent"></h6><button class="btn btn-warning btn-sm mt-3 w-100" data-bs-dismiss="modal">รับทราบ</button></div></div></div></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydLdWyNc2auPXPPZRyp3UBCX8caBJNCBm4Te2r9zazZDNuvgZbvBl6qvItABzQrBdtMQ/exec";
    const GUN_START_TIME = "2025-12-05T16:00:00"; 
    let currentRunner = null;
    let allRunners = [];

    function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }

    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'th-TH'; msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }
    function unlockVoice() { speak("ระบบเสียงพร้อมดูแลนักวิ่งค่ะ"); }

    function toggleMusic() {
        const audio = document.getElementById('bgMusic');
        const icon = document.getElementById('playIcon');
        if (audio.paused) { audio.play(); icon.className = "bi bi-pause-fill"; }
        else { audio.pause(); icon.className = "bi bi-play-fill"; }
    }

    async function verifyStep1() {
        const bib = document.getElementById('scanBib').value.trim();
        if(!bib) return;
        showLoading(true);
        try {
            const res = await fetch(SCRIPT_URL);
            allRunners = await res.json();
            const runner = allRunners.find(r => String(r[2]) === bib && r[1] === 'REG');
            if(runner) {
                currentRunner = { bib: bib, name: runner[3], cat: runner[8] };
                document.getElementById('confirmName').innerText = runner[3];
                document.getElementById('confirmBibDisplay').innerText = "BIB: " + bib;
                showRunnerHistory(bib);
                document.getElementById('scanStep1').style.display = 'none';
                document.getElementById('scanStep2').style.display = 'block';
                speak(`ยืนยันข้อมูล คุณ ${runner[3].trim()} ค่ะ`);
            } else { alert("ไม่พบข้อมูล BIB"); }
        } catch(e) { alert("เชื่อมต่อฐานข้อมูลไม่ได้"); }
        showLoading(false);
    }

    function showRunnerHistory(bib) {
        const history = allRunners.filter(r => String(r[2]) === bib && r[1] === 'RUN');
        let html = '<div class="card bg-black p-3 border-secondary small mt-2"><h6 class="text-warning small fw-bold mb-2">ประวัติจุดสแกน</h6>';
        if(history.length === 0) html += '<div class="opacity-50">ยังไม่มีข้อมูล</div>';
        else {
            history.sort((a,b) => b[5] - a[5]).forEach(h => {
                html += `<div class="d-flex justify-content-between border-bottom border-secondary py-1"><span>📍 ${h[7]} (${h[5]} กม.)</span><span class="text-info">${h[10]} P</span></div>`;
            });
        }
        html += '</div>';
        document.getElementById('runnerHistory').innerHTML = html;
    }

    async function unlockCPButtons() {
        const myHistory = allRunners.filter(r => String(r[2]) === currentRunner.bib && r[1] === 'RUN');
        const maxDist = myHistory.reduce((max, r) => Math.max(max, parseFloat(r[5]) || 0), -1);
        document.getElementById('scanStep2').style.display = 'none';
        document.getElementById('scanStep3').style.display = 'block';
        const buttons = document.querySelectorAll('.btn-checkpoint');
        const dists = [0, 7, 56, 72, 89, 103, 104]; 
        buttons.forEach((btn, i) => {
            btn.classList.remove('btn-pulse');
            if (dists[i] <= maxDist) { btn.disabled = true; btn.style.opacity = "0.4"; btn.innerHTML = "✅ " + btn.innerText; }
            else if (i > 0 && dists[i-1] > maxDist) { btn.disabled = true; btn.style.opacity = "0.2"; }
            else { btn.disabled = false; btn.style.opacity = "1"; btn.classList.add('btn-pulse'); }
        });
    }

    async function scanCP(targetCP, dist) {
        showLoading(true);
        const html5QrCode = new Html5Qrcode("reader");
        document.getElementById('reader').scrollIntoView();
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            if (text.includes(targetCP)) { html5QrCode.stop().then(() => checkPoint(targetCP, dist)); }
            else { alert("ผิดจุด!"); }
        }).then(() => showLoading(false)).catch(() => { showLoading(false); alert("เปิดกล้องไม่ได้"); });
    }

    async function checkPoint(cpCode, dist) {
        showLoading(true);
        const cpNames = { 'Start': 'จุดปล่อยตัว', 'CP1': 'หน้าบิ๊กซี', 'CP2': 'รพ.สต.บ้านแซว', 'CP3': 'รพ.สต.บ้านไร่', 'CP4': 'จุดชมวิวห้วยทรายมาน', 'CP5': 'วัดหาดไคร้', 'CP6': 'เส้นชัย' };
        const now = new Date();
        const start = new Date(GUN_START_TIME);
        const pace = dist > 0 ? ((now - start) / 60000 / dist).toFixed(2) : "0.00";
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'record', bib: currentRunner.bib, end: cpCode, distance: dist, pace: pace }) });
            speak(`บันทึกสำเร็จที่ ${cpNames[cpCode]} ค่ะ`);
            alert("บันทึกสำเร็จ!");
            location.reload();
        } catch(e) { alert("ล้มเหลว"); }
        showLoading(false);
    }

    function loadRanking() {
        showLoading(true);
        fetch(SCRIPT_URL).then(res => res.json()).then(data => {
            allRunners = data;
            const summary = {};
            data.filter(r => r[1] === 'RUN' && r[2] !== 'BIB').forEach(r => {
                if (!summary[r[2]] || r[5] > summary[r[2]].dist) summary[r[2]] = { bib: r[2], name: r[3], dist: r[5], cat: r[8], pace: r[10] };
            });
            const sorted = Object.values(summary).sort((a,b) => b.dist - a.dist);
            let html = '';
            sorted.forEach((r, i) => {
                html += `<tr class="${i<3?'rank-1':''}"><td>${i+1}</td><td>${r.bib}</td><td>${r.name}</td><td class="text-end">${r.dist} กม.</td></tr>`;
            });
            document.getElementById('rankingBody').innerHTML = html;
            showLoading(false);
        });
    }

    function cancelVerify() { location.reload(); }
    function showNews() { 
        document.getElementById('newsContent').innerHTML = "ยินดีต้อนรับสู่ ChiangKhong Ultra 104 Km";
        new bootstrap.Modal('#newsModal').show(); 
    }

    window.addEventListener('load', function() {
        const myForm = document.getElementById('regForm');
        if (myForm) {
            myForm.addEventListener('submit', async (e) => {
                e.preventDefault(); showLoading(true);
                const data = { action: 'register', bib: document.getElementById('regBib').value, name: document.getElementById('regName').value, gender: document.getElementById('regGender').value, category: document.getElementById('regCategory').value };
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                    alert("ลงทะเบียนเรียบร้อย!");
                    myForm.reset();
                } catch (error) { alert("ล้มเหลว"); }
                showLoading(false);
            });
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
