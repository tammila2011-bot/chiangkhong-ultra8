<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiang Khong Ultra 2026 - Master System</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #6f42c1; --success: #28a745; --danger: #dc3545; --warning: #ffc107; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); font-family: 'Prompt', sans-serif; min-height: 100vh; }
        .card { border: none; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); background: rgba(255, 255, 255, 0.95); margin-bottom: 20px; }
        .total-km-box { background: linear-gradient(45deg, #6f42c1, #e91e63); color: white; border-radius: 20px; padding: 15px; text-align: center; }
        #reader { width: 100%; min-height: 280px; background: #000; border-radius: 15px; overflow: hidden; }
        .btn-checkpoint { height: 65px; font-size: 1.1rem; font-weight: 600; border-radius: 15px; display: none; margin-bottom: 8px; }
        .history-card { border-radius: 12px; border: 1px solid #eee; background: #fff; padding: 10px; margin-bottom: 8px; font-size: 0.85rem; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .rank-badge { width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; color: white; margin-right: 10px; }
        .dnf-text { color: var(--danger); font-weight: bold; border: 2px solid var(--danger); padding: 5px 15px; border-radius: 50px; display: inline-block; }
    </style>
</head>
<body>
<div id="loading" class="loading-overlay"><div class="spinner-border text-primary"></div></div>
<div class="container py-3">
    <div class="text-center mb-3">
        <button id="voiceBtn" class="btn btn-outline-primary btn-sm rounded-pill px-4" onclick="unlockAudio()">🔊 เปิดระบบเสียงแจ้งเตือน</button>
    </div>
    
    <ul class="nav nav-pills nav-fill mb-3 bg-white p-1 rounded-pill shadow-sm" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-reg">1.ลงทะเบียน</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-run">2.สแกนจุด</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-stat" onclick="fetchDataFromCloud()">3.อันดับ</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-me">4.ฉัน</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-reg">
            <div class="card p-4 mx-auto" style="max-width: 400px;">
                <h6 class="fw-bold text-center text-primary mb-3">ลงทะเบียน Ultra 104 #8</h6>
                <form id="regForm">
                    <div class="mb-3"><label class="small">เลข BIB</label><input type="text" id="regBib" class="form-control" required></div>
                    <div class="mb-3"><label class="small">ชื่อ-นามสกุล</label><input type="text" id="regName" class="form-control" required></div>
                    <div class="row">
                        <div class="col-6 mb-3"><label class="small">เพศ</label><select id="regGender" class="form-select"><option value="M">ชาย</option><option value="F">หญิง</option></select></div>
                        <div class="col-6 mb-3"><label class="small">ประเภท</label><select id="regCategory" class="form-select"><option value="Solo">เดี่ยว</option><option value="Couple">ผลัด 2</option><option value="Team3">ผลัด 3</option><option value="Team10">ผลัด 10</option></select></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">บันทึกลงทะเบียน</button>
                </form>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-run">
            <div class="card p-3 mx-auto" style="max-width: 500px;">
                <input type="text" id="scanBib" class="form-control text-center mb-3 border-primary fw-bold" placeholder="ระบุ BIB">
                <div id="reader" class="mb-3"></div>
                <div class="d-grid gap-2 mb-3">
                    <button id="startScanBtn" class="btn btn-dark btn-sm rounded-pill" onclick="startScanner()">📸 เปิดกล้อง</button>
                    <button id="stopScanBtn" class="btn btn-outline-danger btn-sm rounded-pill" onclick="stopScanner()" style="display:none;">ปิดกล้อง</button>
                </div>
                <div id="btnArea" class="d-grid gap-2" style="display:none;">
                    <button id="btnStart" class="btn btn-dark p-3 fw-bold btn-checkpoint" onclick="checkPoint('Start')">🚩 Start (กม.0)</button>
                    <button id="btnCP1" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP1')">📍 CP-1 (กม.7)</button>
                    <button id="btnCP2" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP2')">📍 CP-2 (กม.56)</button>
                    <button id="btnCP3" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP3')">📍 CP-3 (กม.72)</button>
                    <button id="btnCP4" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP4')">📍 CP-4 (กม.89)</button>
                    <button id="btnCP5" class="btn btn-success p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP5')">📍 CP-5 (กม.103)</button>
                    <button id="btnCP6" class="btn btn-danger p-3 fw-bold btn-checkpoint" onclick="checkPoint('CP6')">🏁 Finish (กม.104)</button>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-stat">
            <div class="card p-3 mx-auto" style="max-width: 600px;">
                <div class="total-km-box mb-3">
                    <small>รวมระยะทางสะสม (รวมคน DNF)</small>
                    <h2 class="fw-bold"><span id="grandTotalKm">0.00</span> กม.</h2>
                </div>
                <div class="d-flex flex-wrap gap-1 justify-content-center mb-3">
                    <button class="btn btn-sm btn-outline-primary active" onclick="fetchDataFromCloud('All')">ทั้งหมด</button>
                    <button class="btn btn-sm btn-outline-primary" onclick="fetchDataFromCloud('Solo-M')">ชายเดี่ยว</button>
                    <button class="btn btn-sm btn-outline-primary" onclick="fetchDataFromCloud('Solo-F')">หญิงเดี่ยว</button>
                    <button class="btn btn-sm btn-outline-success" onclick="fetchDataFromCloud('Team')">ทีมผลัด</button>
                </div>
                <div id="rankingTable" class="table-responsive">
                    <table class="table table-sm">
                        <thead><tr><th>#</th><th>BIB</th><th>ชื่อ</th><th class="text-end">เวลา/กม.</th></tr></thead>
                        <tbody id="rankingBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-me">
            <div class="card p-3 mx-auto text-center" style="max-width: 500px;">
                <div class="input-group mb-3">
                    <input type="text" id="myBibSearch" class="form-control text-center fw-bold" placeholder="ระบุ BIB">
                    <button class="btn btn-primary" onclick="loadMyStats()">ดูผลงาน</button>
                </div>
                <div id="myResultArea" style="display:none;">
                    <h4 id="myNameDisplay" class="fw-bold text-primary mb-1"></h4>
                    <div id="myRankDisplay" class="mb-2 fw-bold text-success"></div>
                    <div id="myStatusDisplay" class="mb-3"></div>
                    <div id="myPaceBadge" class="mb-3"></div>
                    <div class="progress mb-2" style="height:25px; border-radius:15px;">
                        <div id="myProgressBar" class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                    </div>
                    <div class="small fw-bold"><span id="myDistDisplay">0.00</span> / 104 กม.</div>
                    <div id="myHistoryList" class="text-start mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyA2rMlXRgXSs_Zx3recKiuZ06QfbhnH5jG4eNUYRMC5Ff3qH90c5Cp0ia4P89Sr8yS/exec";
    const distances = { 'Start': 0, 'CP1': 7, 'CP2': 56, 'CP3': 72, 'CP4': 89, 'CP5': 103, 'CP6': 104 };
    const pointNames = { 'Start': 'จุด Start', 'CP1': 'CP-1', 'CP2': 'CP-2', 'CP3': 'CP-3', 'CP4': 'CP-4', 'CP5': 'CP-5', 'CP6': 'Finish (กม.104)' };
    const LIMIT_HOURS = 24;

    let html5QrCode;

    // ส่วนของกล้องและเสียง (เหมือนเดิม)
    async function startScanner() {
        try {
            const cams = await Html5Qrcode.getCameras();
            if (cams.length > 0) {
                document.getElementById('startScanBtn').style.display = 'none';
                document.getElementById('stopScanBtn').style.display = 'block';
                if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                    try { const url = new URL(text); const p = url.searchParams.get("point"); if (p && pointNames[p]) { speak("พบจุด " + pointNames[p]); handleScannedPoint(p); stopScanner(); } } catch(e) {}
                });
            }
        } catch (err) { alert("กล้องมีปัญหา: " + err); }
    }
    function stopScanner() { if (html5QrCode?.isScanning) html5QrCode.stop().then(() => { document.getElementById('startScanBtn').style.display = 'block'; document.getElementById('stopScanBtn').style.display = 'none'; }); }
    function handleScannedPoint(p) { document.getElementById('btnArea').style.display = 'grid'; document.querySelectorAll('.btn-checkpoint').forEach(b => b.style.display = 'none'); document.getElementById('btn' + p).style.display = 'block'; }
    function speak(t) { if ('speechSynthesis' in window) { const m = new SpeechSynthesisUtterance(t); m.lang = 'th-TH'; window.speechSynthesis.speak(m); } }
    function unlockAudio() { const m = new SpeechSynthesisUtterance('ระบบพร้อมบันทึกสถิติค่ะ'); m.lang = 'th-TH'; window.speechSynthesis.speak(m); }
    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }

    // ลงทะเบียนและบันทึกจุด
    document.getElementById('regForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = { action: 'register', bib: document.getElementById('regBib').value.trim(), name: document.getElementById('regName').value.trim(), gender: document.getElementById('regGender').value, category: document.getElementById('regCategory').value };
        showLoading(true);
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        speak("ลงทะเบียนสำเร็จแล้วค่ะ");
        showLoading(false);
    };

    async function checkPoint(code) {
        const bib = document.getElementById('scanBib').value.trim(); if(!bib) return alert('ระบุ BIB');
        showLoading(true);
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'record', bib: bib, end: code, distance: distances[code] }) });
        speak("บันทึกจุด " + pointNames[code] + " สำเร็จ");
        showLoading(false);
    }

    // --- ส่วนจัดอันดับที่อาจารย์ต้องการ ---
    async function fetchDataFromCloud(filter = 'All') {
        showLoading(true);
        try {
            const res = await fetch(SCRIPT_URL);
            const rows = await res.json();
            const ranking = processRanking(rows, filter);
            
            document.getElementById('grandTotalKm').innerText = ranking.grandTotal.toFixed(2);
            document.getElementById('rankingBody').innerHTML = ranking.list.map((r, i) => `
                <tr>
                    <td><span class="rank-badge" style="background:${i<3?['#FFD700','#C0C0C0','#CD7F32'][i]:'#6c757d'}">${i+1}</span></td>
                    <td>${r.bib}</td>
                    <td>${r.name}<br><small class="text-muted">${r.cat}</small></td>
                    <td class="text-end fw-bold">${r.isFinish ? (r.time+' ชม.') : (r.maxDist+' กม.')}</td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
        showLoading(false);
    }

    function processRanking(rows, filter) {
        let stats = {}, info = {}, grandTotal = 0;
        rows.slice(1).forEach(r => {
            const bib = String(r[2]).trim();
            if (r[1] === 'REG') info[bib] = { name: r[3], cat: r[8], gen: r[9] };
            if (r[1] === 'RUN') {
                if (!stats[bib]) stats[bib] = { dists: [], times: [], points: [] };
                stats[bib].dists.push(parseFloat(r[5] || 0));
                stats[bib].times.push(new Date(r[0]));
                stats[bib].points.push(r[7]);
                grandTotal += parseFloat(r[5] || 0);
            }
        });

        let list = Object.keys(stats).map(bib => {
            const s = stats[bib];
            const maxDist = Math.max(...s.dists);
            const startT = s.times[s.points.indexOf('Start')];
            const endT = s.times[s.points.indexOf('CP6')];
            let timeDiff = (startT && endT) ? (endT - startT) / (1000 * 60 * 60) : 999;
            const isFinish = s.points.includes('CP6') && s.points.includes('Start') && timeDiff <= LIMIT_HOURS;
            
            return { bib, name: info[bib]?.name || 'นักวิ่ง', cat: info[bib]?.cat, gen: info[bib]?.gen, maxDist, time: timeDiff.toFixed(2), isFinish };
        });

        // Filter
        if (filter === 'Solo-M') list = list.filter(r => r.cat === 'Solo' && r.gen === 'M');
        if (filter === 'Solo-F') list = list.filter(r => r.cat === 'Solo' && r.gen === 'F');
        if (filter === 'Team') list = list.filter(r => r.cat !== 'Solo');

        // เรียงลำดับ: Finisher มาก่อน (ตามเวลา), ตามด้วย DNF (ตามระยะทาง)
        list.sort((a,b) => a.isFinish === b.isFinish ? (a.isFinish ? a.time - b.time : b.maxDist - a.maxDist) : (b.isFinish - a.isFinish));
        
        return { list, grandTotal };
    }

    // --- ส่วนดูผลงานของฉัน (โชว์ Rank และ DNF Memorial) ---
    async function loadMyStats() {
        const bib = document.getElementById('myBibSearch').value.trim(); if(!bib) return;
        showLoading(true);
        try {
            const res = await fetch(SCRIPT_URL);
            const rows = await res.json();
            const allRanks = processRanking(rows, 'All').list;
            const myRankIndex = allRanks.findIndex(r => r.bib === bib);
            const myData = allRanks[myRankIndex];
            
            if(myData) {
                const s = rows.filter(r => String(r[2]).trim() === bib && r[1] === 'RUN');
                let histArray = s.map(r => `<div class="history-card shadow-sm border-start border-primary border-4">📅 ${new Date(r[0]).toLocaleTimeString('th-TH')} | 📍 ${pointNames[r[7]] || r[7]} <span class="text-success fw-bold">+${parseFloat(r[5]).toFixed(2)} กม.</span></div>`);
                
                document.getElementById('myNameDisplay').innerText = myData.name;
                document.getElementById('myRankDisplay').innerText = `อันดับรวม: ${myRankIndex + 1}`;
                
                if (myData.isFinish) {
                    document.getElementById('myStatusDisplay').innerHTML = "🥇 <span class='fw-bold text-success'>OFFICIAL FINISHER</span>";
                } else {
                    document.getElementById('myStatusDisplay').innerHTML = "<span class='dnf-text'>DNF (Keep Fighting!)</span><br><small class='text-muted'>ระยะทางคือความภูมิใจ ทุกก้าวคือการเรียนรู้</small>";
                }

                // คำนวณ Pace
                let paceText = "--:--";
                if (myData.maxDist > 0) {
                    const sTime = new Date(s.find(r => r[7] === 'Start')?.[0]);
                    const lTime = new Date(s[s.length-1][0]);
                    if (sTime && lTime > sTime) {
                        let mins = (lTime - sTime) / (1000 * 60);
                        let pace = mins / myData.maxDist;
                        paceText = `${Math.floor(pace)}:${Math.round((pace%1)*60).toString().padStart(2,'0')} min/km`;
                    }
                }
                
                document.getElementById('myPaceBadge').innerHTML = `<span class="badge bg-warning text-dark px-3 py-2">Pace เฉลี่ย: ${paceText}</span>`;
                document.getElementById('myDistDisplay').innerText = myData.maxDist.toFixed(2);
                document.getElementById('myProgressBar').style.width = (myData.maxDist/104*100) + '%';
                document.getElementById('myHistoryList').innerHTML = histArray.reverse().join('');
                document.getElementById('myResultArea').style.display = 'block';
            } else { alert("ไม่พบข้อมูล BIB นี้ครับ"); }
        } catch(e) { console.error(e); }
        showLoading(false);
    }
</script>
</body>
</html>
