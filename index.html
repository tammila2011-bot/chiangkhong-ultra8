<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA 104 #8 - CHIANG KHONG</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #8e6d31; --primary-light: #b59451; --dark-bg: #000; --card-bg: rgba(255,255,255,0.08); }
        body { background-color: var(--dark-bg); color: #eee; font-family: 'Prompt', sans-serif; min-height: 100vh; padding-bottom: 120px; margin: 0; }
        .main-header { background: #000; border-bottom: 3px solid var(--primary); line-height: 0; }
        .logo-img { width: 100%; height: auto; display: block; }
        .nav-pills .nav-link { color: #aaa; border-radius: 50px; font-size: 0.85rem; }
        .nav-pills .nav-link.active { background-color: var(--primary); color: #000; font-weight: 600; }
        .card { border: 1px solid #444; border-radius: 20px; background: var(--card-bg); margin-bottom: 15px; }
        .bottom-dashboard { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 15, 15, 0.98); border-top: 2px solid var(--primary); padding: 10px 0; z-index: 1050; }
        .btn-dash-sm { background: transparent; border: none; color: #888; font-size: 0.7rem; width: 100%; }
        .btn-dash-sm i { font-size: 1.4rem; display: block; }
        .btn-dash-sm.active { color: var(--primary-light); }
        #reader { width: 100%; border-radius: 15px; border: 2px solid var(--primary); background: #111; overflow:hidden; display: none; margin-bottom: 15px; }
        .btn-checkpoint { height: 60px; font-weight: 600; border-radius: 15px; margin-bottom: 8px; }
        .btn-pulse { animation: pulse-green 2s infinite; border: 2px solid #fff !important; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(40,167,69,0.7); } 70% { box-shadow: 0 0 0 15px rgba(40,167,69,0); } 100% { box-shadow: 0 0 0 0 rgba(40,167,69,0); } }
        #loading { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; display:none; justify-content:center; align-items:center; }
        .history-card { background: rgba(255,255,255,0.1); border-left: 5px solid var(--primary); padding: 12px; border-radius: 10px; margin-bottom: 12px; color: #fff; text-shadow: 1px 1px 2px #000; }
        .rank-gold { color: #ffd700; } .rank-silver { color: #c0c0c0; } .rank-bronze { color: #cd7f32; }
    </style>
</head>
<body>

<div id="loading"><div class="spinner-border text-primary"></div></div>

<header class="main-header"><img src="loco.png" alt="ULTRA 104" class="logo-img"></header>

<div class="container mt-3">
    <div class="text-center mb-3">
        <button class="btn btn-sm btn-outline-warning rounded-pill px-3" onclick="toggleMusic()">🎵 104 Song <i id="playIcon" class="bi bi-play-fill"></i></button>
        <audio id="bgMusic" src="104 song.mp3" loop></audio>
    </div>

    <ul class="nav nav-pills nav-fill mb-3 bg-dark p-1 rounded-pill shadow">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-scan">สแกนจุด</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-stat" onclick="loadRanking()">อันดับ</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-me" onclick="loadMyResult()">ผลงาน</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-reg">สมัคร</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-scan">
            <div class="card p-3 shadow-lg text-center">
                <div id="scanStep1">
                    <div class="input-group mb-3">
                        <input type="text" id="scanBib" class="form-control text-center bg-dark text-white border-secondary" placeholder="ระบุเลข BIB">
                        <button class="btn btn-warning fw-bold px-4" onclick="verifyStep1()">🔍 ตรวจสอบ</button>
                    </div>
                </div>
                <div id="scanStep2" style="display:none;">
                    <h2 class="text-primary fw-bold mb-1" id="confirmName">---</h2>
                    <span class="badge bg-secondary mb-3 fs-6" id="confirmBibDisplay">BIB: ---</span>
                    <div id="runnerHistoryScan" class="text-start mb-4"></div>
                    <div class="d-grid gap-3">
                        <button class="btn btn-success btn-lg fw-bold py-3 rounded-4" onclick="unlockCPButtons()">✅ ยืนยันข้อมูลถูกต้อง</button>
                        <button class="btn btn-outline-danger btn-sm border-0" onclick="cancelVerify()">❌ ข้อมูลผิดคน (ยกเลิก)</button>
                    </div>
                </div>
                <div id="scanStep3" style="display:none;">
                    <div class="alert alert-dark text-center fw-bold border-warning mb-3">🏁 จุดเช็คอินสำหรับ: <span id="activeRunnerName" class="text-warning"></span></div>
                    <div id="reader"></div>
                    <div class="d-grid" id="btnArea">
                        <button class="btn btn-dark btn-checkpoint" onclick="scanCP('Start', 0)">🚩 Start (กม.0)</button>
                        <button class="btn btn-success btn-checkpoint" onclick="scanCP('CP1', 7)">📍 CP-1 (กม.7)</button>
                        <button class="btn btn-success btn-checkpoint" onclick="scanCP('CP2', 56)">📍 CP-2 (กม.56)</button>
                        <button class="btn btn-success btn-checkpoint" onclick="scanCP('CP3', 72)">📍 CP-3 (กม.72)</button>
                        <button class="btn btn-success btn-checkpoint" onclick="scanCP('CP4', 89)">📍 CP-4 (กม.89)</button>
                        <button class="btn btn-success btn-checkpoint" onclick="scanCP('CP5', 103)">📍 CP-5 (กม.103)</button>
                        <button class="btn btn-danger btn-checkpoint" onclick="scanCP('CP6', 104)">🏁 Finish (กม.104)</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-stat">
            <div class="card p-3">
                <div class="mb-3">
                    <h6 class="fw-bold text-warning m-0 mb-2">Live Ranking 104 Km.</h6>
                    <select id="rankFilter" class="form-select form-select-sm bg-dark text-white border-secondary" onchange="filterRanking()">
                        <option value="All">ทุกประเภท</option>
                        <option value="Solo_M">Solo - ชาย (Male)</option>
                        <option value="Solo_F">Solo - หญิง (Female)</option>
                        <option value="Couple">ผลัด 2 (Couple)</option>
                        <option value="Team3">ผลัด 3 (Team 3)</option>
                        <option value="Team10">ผลัด 10 (Team 10)</option>
                    </select>
                </div>
                <div class="table-responsive small"><table class="table table-dark"><thead><tr><th>#</th><th>BIB</th><th>ชื่อ</th><th class="text-end">ระยะ</th></tr></thead><tbody id="rankingBody"></tbody></table></div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-me">
            <div class="card p-4 text-center">
                <h5 class="fw-bold text-primary mb-3">ตรวจสอบผลงานส่วนตัว</h5>
                <input type="text" id="meBib" class="form-control text-center mb-3 bg-dark text-white border-primary" placeholder="ใส่เลข BIB">
                <button class="btn btn-warning w-100 fw-bold" onclick="loadMyResult()">ดูผลการแข่งขัน</button>
                <div id="meContent" class="mt-4 text-start"></div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-reg">
            <div class="card p-4">
                <h5 class="fw-bold mb-4 text-primary">สมัครนักวิ่ง</h5>
                <form id="regForm">
                    <div class="mb-3"><label class="small text-muted">เลข BIB</label><input type="text" id="regBib" class="form-control text-center fw-bold" required></div>
                    <div class="mb-3"><label class="small text-muted">ชื่อ-นามสกุล</label><input type="text" id="regName" class="form-control" required></div>
                    <div class="row g-2 mb-4">
                        <div class="col-6"><label class="small text-muted">เพศ</label><select id="regGender" class="form-select"><option value="M">ชาย (Male)</option><option value="F">หญิง (Female)</option></select></div>
                        <div class="col-6"><label class="small text-muted">ประเภท</label><select id="regCategory" class="form-select">
                            <option value="Solo">Solo (เดี่ยว)</option>
                            <option value="Couple">ผลัด 2</option>
                            <option value="Team3">ผลัด 3</option>
                            <option value="Team10">ผลัด 10</option>
                        </select></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-3">บันทึกข้อมูล</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="bottom-dashboard"><div class="container"><div class="row text-center">
    <div class="col-3"><button class="btn-dash-sm" onclick="showMsg('news')"><i class="bi bi-megaphone"></i>ข่าวสาร</button></div>
    <div class="col-3"><button class="btn-dash-sm" onclick="showMsg('staff')"><i class="bi bi-people"></i>ทีมงาน</button></div>
    <div class="col-3"><button class="btn-dash-sm btn-sos" onclick="showMsg('sos')"><i class="bi bi-heart-pulse"></i>SOS</button></div>
    <div class="col-3"><button class="btn-dash-sm" onclick="unlockVoice()"><i class="bi bi-volume-up"></i>เสียง AI</button></div>
</div></div></div>

<canvas id="certCanvas" style="display:none;"></canvas>

<div class="modal fade" id="infoModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered modal-sm"><div class="modal-content bg-dark text-white border-primary rounded-4"><div class="modal-body text-center p-4"><i id="infoIcon" class="bi fs-1 text-warning"></i><h5 id="infoTitle" class="mt-3 fw-bold"></h5><p id="infoContent" class="small opacity-75"></p><button class="btn btn-warning w-100 mt-3 rounded-pill fw-bold" data-bs-dismiss="modal">ตกลง</button></div></div></div></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydLdWyNc2auPXPPZRyp3UBCX8caBJNCBm4Te2r9zazZDNuvgZbvBl6qvItABzQrBdtMQ/exec";
    const GUN_START_TIME = "2025-12-05T16:00:00"; 
    let currentRunner = null, allData = [], html5QrCode = null;

    function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }
    function speak(text) { if (!window.speechSynthesis) return; window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(text); msg.lang = 'th-TH'; msg.rate = 0.95; window.speechSynthesis.speak(msg); }
    function unlockVoice() { speak("ระบบเสียงเชียงของ อัลตร้า มาราธอน พร้อมแล้วค่ะ"); }
    function toggleMusic() {
        const audio = document.getElementById('bgMusic'); const icon = document.getElementById('playIcon');
        if (audio.paused) { audio.play(); icon.className = "bi bi-pause-fill"; } else { audio.pause(); icon.className = "bi bi-play-fill"; }
    }

    async function verifyStep1() {
        const bib = document.getElementById('scanBib').value.trim();
        if(!bib) return;
        showLoading(true);
        try {
            const res = await fetch(SCRIPT_URL); allData = await res.json();
            const runner = allData.find(r => String(r[2]) === bib && r[1] === 'REG');
            if(runner) {
                currentRunner = { bib: bib, name: runner[3], cat: runner[8], gender: runner[7] };
                document.getElementById('confirmName').innerText = runner[3];
                document.getElementById('confirmBibDisplay').innerText = "BIB: " + bib;
                showRunnerHistoryScan(bib);
                document.getElementById('scanStep1').style.display = 'none';
                document.getElementById('scanStep2').style.display = 'block';
                speak(`ยืนยันตัวตนสำเร็จ คุณ ${runner[3].trim()} ค่ะ`);
            } else { alert("ไม่พบข้อมูล BIB"); }
        } catch(e) { alert("เชื่อมต่อผิดพลาด"); }
        showLoading(false);
    }

    function showRunnerHistoryScan(bib) {
        const hist = allData.filter(r => String(r[2]) === bib && r[1] === 'RUN');
        let html = '<div class="card bg-black p-3 border-secondary small mt-2"><h6 class="text-warning small fw-bold mb-2">ประวัติจุดล่าสุด:</h6>';
        if(hist.length === 0) html += '<div class="opacity-50 text-center py-2">ยังไม่มีข้อมูลสแกน</div>';
        else {
            hist.sort((a,b) => b[5] - a[5]).forEach(h => {
                html += `<div class="d-flex justify-content-between border-bottom border-secondary py-1 text-white"><span>📍 ${h[4]} (${h[5]} กม.)</span><span>Pace: ${h[10]}</span></div>`;
            });
        }
        html += '</div>';
        document.getElementById('runnerHistoryScan').innerHTML = html;
    }

    async function unlockCPButtons() {
        const hist = allData.filter(r => String(r[2]) === currentRunner.bib && r[1] === 'RUN');
        const maxD = hist.reduce((max, r) => Math.max(max, parseFloat(r[5]) || 0), -1);
        document.getElementById('scanStep2').style.display = 'none';
        const s3 = document.getElementById('scanStep3'); s3.style.display = 'block';
        document.getElementById('activeRunnerName').innerText = currentRunner.name;
        
        setTimeout(() => { s3.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 200);

        const dists = [0, 7, 56, 72, 89, 103, 104];
        document.querySelectorAll('.btn-checkpoint').forEach((btn, i) => {
            btn.classList.remove('btn-pulse');
            if (dists[i] <= maxD) { 
                btn.disabled = true; btn.style.opacity = "0.3"; 
                btn.innerHTML = "✅ " + (btn.innerText.includes(')') ? btn.innerText.split(') ')[1] : btn.innerText); 
            } else if (i > 0 && dists[i-1] > maxD) { 
                btn.disabled = true; btn.style.opacity = "0.1"; 
            } else { 
                btn.disabled = false; btn.style.opacity = "1"; btn.classList.add('btn-pulse'); 
            }
        });
        speak(`พร้อมสแกนค่ะ กรุณากดปุ่มจุดที่คุณอยู่ปัจจุบันนะคะ`);
    }

    async function scanCP(targetCP, dist) {
        const reader = document.getElementById('reader'); reader.style.display = 'block';
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        if (html5QrCode.isScanning) await html5QrCode.stop();
        speak(`สแกน QR Code จุด ${targetCP} ค่ะ`);
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            if (text.includes(targetCP)) {
                html5QrCode.stop().then(() => { reader.style.display = 'none'; checkPoint(targetCP, dist); });
            } else { speak("ป้ายไม่ถูกต้องค่ะ"); alert("ผิดจุด!"); }
        }).catch(err => alert("เปิดกล้องไม่ได้"));
    }

    async function checkPoint(cpCode, dist) {
        showLoading(true);
        const now = new Date(), start = new Date(GUN_START_TIME);
        const diffMin = (now - start) / 60000;
        const pace = dist > 0 ? (diffMin / dist).toFixed(2) : "0.00";
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'record', bib: currentRunner.bib, end: cpCode, distance: dist, pace: pace }) });
            
            if (dist >= 104) {
                // 3. Finish Celebration
                speak(`ไชโย! ยินดีด้วยค่ะคุณ ${currentRunner.name} คุณทำได้แล้ว! คุณพิชิตระยะทางหนึ่งร้อยสี่กิโลเมตร เข้าสู่เส้นชัยศาลาหนึ่งศูนย์สี่ระเบียงโขงเชียงของสำเร็จ คุณคือสุดยอดนักสู้หัวใจเพชรค่ะ!`);
                alert("🚩 FINISH 104 KM!");
                generateCertificate(); // เปิดใบประกาศ
            } else {
                const remain = (104 - dist).toFixed(1);
                const msg = `สแกนจุด ${cpCode} สำเร็จ ระยะสะสม ${dist} กิโลเมตร เหลือระยะทางอีก ${remain} กิโลเมตร สู้ต่อไปนะคะคุณ ${currentRunner.name}`;
                speak(msg); alert(msg); location.reload();
            }
        } catch(e) { alert("ล้มเหลว"); }
        showLoading(false);
    }

    // 1. Ranking แยก Solo ชาย/หญิง
    async function loadRanking() {
        showLoading(true); const res = await fetch(SCRIPT_URL); allData = await res.json();
        filterRanking(); showLoading(false);
    }

    function filterRanking() {
        const filter = document.getElementById('rankFilter').value;
        const summary = {};
        allData.filter(r => r[1] === 'RUN' && r[2] !== 'BIB').forEach(r => {
            const bib = r[2]; const d = parseFloat(r[5]);
            if (!summary[bib] || d > summary[bib].dist) summary[bib] = { bib: bib, name: r[3], dist: d, cat: r[8], gender: r[7], pace: r[10] };
        });

        const sorted = Object.values(summary).filter(r => {
            if (filter === 'All') return true;
            if (filter === 'Solo_M') return r.cat === 'Solo' && r.gender === 'M';
            if (filter === 'Solo_F') return r.cat === 'Solo' && r.gender === 'F';
            return r.cat === filter;
        }).sort((a,b) => b.dist - a.dist);

        let html = '';
        sorted.forEach((r, i) => {
            let icon = (i === 0) ? '🥇' : (i === 1) ? '🥈' : (i === 2) ? '🥉' : i + 1;
            html += `<tr class="${i<3?'rank-gold':''}"><td>${icon}</td><td>${r.bib}</td><td>${r.name}<br><small>${r.cat}-${r.gender}</small></td><td class="text-end text-warning">${r.dist} กม.</td></tr>`;
        });
        document.getElementById('rankingBody').innerHTML = html || '<tr><td colspan="4" class="text-center">ไม่พบข้อมูล</td></tr>';
    }

    // 5. ปรับปรุงหน้าผลงาน (Clear UI + Accurate Pace)
    async function loadMyResult() {
        const bib = document.getElementById('meBib').value.trim();
        if(!bib) return;
        showLoading(true); const res = await fetch(SCRIPT_URL); allData = await res.json();
        const hist = allData.filter(r => String(r[2]) === bib && r[1] === 'RUN');
        const info = allData.find(r => String(r[2]) === bib && r[1] === 'REG');
        let html = '';
        if(!info) html = '<p class="text-center py-4 text-warning">ไม่พบข้อมูล BIB นี้</p>';
        else {
            const maxD = hist.length ? Math.max(...hist.map(h => h[5])) : 0;
            html = `<div class="p-4 bg-dark rounded-4 text-center border border-primary mb-3 shadow">
                        <h4 class="fw-bold text-white mb-1">${info[3]}</h4>
                        <span class="badge bg-secondary mb-3">BIB: ${bib} | ${info[8]}</span>
                        <h1 class="text-warning fw-bold mb-0">${maxD} <small class="fs-6">กม.</small></h1>
                    </div><h6 class="fw-bold mb-3 text-info">ประวัติการเดินทาง:</h6>`;
            
            hist.sort((a,b) => b[5] - a[5]).forEach(h => {
                html += `<div class="history-card shadow">
                            <div class="d-flex justify-content-between mb-1">
                                <span class="fw-bold">📍 จุด: ${h[4]}</span>
                                <span class="badge bg-primary fs-6">Pace: ${h[10]}</span>
                            </div>
                            <div class="d-flex justify-content-between small text-white-50">
                                <span>📅 ${h[0]}</span>
                                <span class="fw-bold text-warning">+${h[5]} KM</span>
                            </div>
                         </div>`;
            });
        }
        document.getElementById('meContent').innerHTML = html;
        showLoading(false);
    }

    // 2 & 3. ใบประกาศเกียรติบัตร
    function generateCertificate() {
        const canvas = document.getElementById('certCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image(); img.crossOrigin = "anonymous";
        img.src = 'certificate_bg.png'; // ใช้ชื่อไฟล์ที่อาจารย์แจ้ง
        img.onload = () => {
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0); ctx.textAlign = 'center'; ctx.fillStyle = '#1a1a1a';
            ctx.font = 'bold 80px "Prompt"'; ctx.fillText(currentRunner.name, canvas.width/2, canvas.height * 0.48);
            ctx.font = 'bold 60px "Prompt"'; ctx.fillText("BIB: " + currentRunner.bib, canvas.width/2, canvas.height * 0.56);
            ctx.font = 'bold 70px "Prompt"'; ctx.fillText("ระยะทาง 104 กม.", canvas.width/2, canvas.height * 0.68);
            const dataUrl = canvas.toDataURL('image/png');
            const win = window.open('', '_blank');
            win.document.write(`<html><body style="margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;"><img src="${dataUrl}" style="max-width:95%;border:5px solid #8e6d31;border-radius:15px;"></body></html>`);
        };
    }

    function showMsg(type) {
        const modal = new bootstrap.Modal('#infoModal'), t = document.getElementById('infoTitle'), c = document.getElementById('infoContent'), i = document.getElementById('infoIcon');
        if(type==='sos'){ t.innerText="🆘 ฉุกเฉิน"; c.innerText="แจ้งจุด CP ใกล้ที่สุด หรือโทรสายด่วน 08X-XXX-XXXX"; i.className="bi bi-heart-pulse-fill text-danger"; speak("แจ้งฉุกเฉินสำเร็จค่ะ"); }
        else if(type==='staff'){ t.innerText="👥 ทีมงาน"; c.innerText="ทีมเชียงของรันเนอร์ยินดีดูแลคุณ"; i.className="bi bi-people-fill text-info"; }
        else { t.innerText="📢 ข่าวสาร"; c.innerText="ยินดีต้อนรับสู่สนาม ChiangKhong Ultra 104 Km."; i.className="bi bi-megaphone-fill text-warning"; }
        modal.show();
    }

    window.addEventListener('load', () => {
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault(); showLoading(true);
            const data = { action: 'register', bib: document.getElementById('regBib').value, name: document.getElementById('regName').value, gender: document.getElementById('regGender').value, category: document.getElementById('regCategory').value };
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            // 2. เสียงลงทะเบียนสำเร็จ
            speak(`ลงทะเบียนสำเร็จแล้วคุณ ${data.name} หมายเลขบิบของคุณคือ ${data.bib} สแกนจุดสตาร์ทเพื่อเริ่มการแข่งขันได้เลยค่ะ`);
            alert("สมัครสำเร็จ!"); location.reload();
        });
    });
</script>
