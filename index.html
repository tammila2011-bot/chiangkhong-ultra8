<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydLdWyNc2auPXPPZRyp3UBCX8caBJNCBm4Te2r9zazZDNuvgZbvBl6qvItABzQrBdtMQ/exec";
    const GUN_START_TIME_STR = "2025-12-05T16:00:00"; 
    let currentRunner = null, allData = [], html5QrCode = null;

    const cpNames = { 'Start': 'จุดปล่อยตัว', 'CP1': 'หน้าบิ๊กซี สนามบิน', 'CP2': 'รพ.สต.บ้านแซว', 'CP3': 'รพ.สต.บ้านไร่', 'CP4': 'จุดชมวิวห้วยทรายมาน', 'CP5': 'วัดหาดไคร้', 'CP6': 'ศาลา 104 เชียงของ' };

    function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }
    function speak(text) { if (!window.speechSynthesis) return; window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(text); msg.lang = 'th-TH'; msg.rate = 1.0; window.speechSynthesis.speak(msg); }
    
    // --- 🥇 1. แก้ไข Ranking แยกชายหญิงให้สมบูรณ์ ---
    async function loadRanking() {
        showLoading(true);
        const res = await fetch(SCRIPT_URL);
        allData = await res.json();
        filterRanking();
        showLoading(false);
    }

    function filterRanking() {
        const f = document.getElementById('rankFilter').value;
        const summary = {};
        
        // กรองเอาเฉพาะข้อมูลการวิ่ง และหาจุดที่ไกลที่สุดของแต่ละคน
        allData.filter(r => r[1] === 'RUN' && r[2] !== 'BIB').forEach(r => {
            const bib = String(r[2]);
            const dist = parseFloat(r[5]) || 0;
            // ดึงข้อมูล REG มาหาเพศและประเภท (REG อยู่ใน allData)
            const regInfo = allData.find(reg => String(reg[2]) === bib && reg[1] === 'REG');
            const gender = regInfo ? regInfo[7] : 'M';
            const cat = regInfo ? regInfo[8] : 'Solo';

            if (!summary[bib] || dist > summary[bib].dist) {
                summary[bib] = { bib: bib, name: r[3], dist: dist, cat: cat, gender: gender };
            }
        });

        // กรองตามเงื่อนไขที่เลือก
        const sorted = Object.values(summary).filter(r => {
            if (f === 'All') return true;
            if (f === 'Solo_M') return r.cat === 'Solo' && r.gender === 'M';
            if (f === 'Solo_F') return r.cat === 'Solo' && r.gender === 'F';
            return r.cat === f;
        }).sort((a,b) => b.dist - a.dist);

        let html = '';
        sorted.forEach((r, i) => {
            let icon = (i === 0) ? '🥇' : (i === 1) ? '🥈' : (i === 2) ? '🥉' : i + 1;
            html += `<tr class="${i<3?'rank-gold':''}"><td>${icon}</td><td>${r.bib}</td><td>${r.name}<br><small>${r.cat}-${r.gender}</small></td><td class="text-end text-warning">${r.dist} กม.</td></tr>`;
        });
        document.getElementById('rankingBody').innerHTML = html || '<tr><td colspan="4" class="text-center">ไม่พบข้อมูล</td></tr>';
    }

    // --- 🔄 2. ระบบ Reset เพื่อรับนักวิ่งคนต่อไป (Loop) ---
    function cancelVerify() {
        currentRunner = null;
        document.getElementById('scanBib').value = '';
        document.getElementById('scanStep1').style.display = 'block';
        document.getElementById('scanStep2').style.display = 'none';
        document.getElementById('scanStep3').style.display = 'none';
        if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop();
        document.getElementById('reader').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function checkPoint(cpCode, dist) {
        showLoading(true);
        const now = new Date(), gunStart = new Date(GUN_START_TIME_STR + "+07:00");
        const pace = dist > 0 ? ((now - gunStart) / 60000 / dist).toFixed(2) : "0.00";
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'record', bib: currentRunner.bib, end: cpCode, distance: dist, pace: pace }) });
            
            let msg = "";
            if (dist >= 104) {
                msg = `ยินดีด้วยค่ะคุณ ${currentRunner.name} เข้าเส้นชัย 104 กิโลเมตรสำเร็จแล้วค่ะ!`;
                speak(msg);
                alert(msg);
                // ถ้าเข้าเส้นชัย ให้พาไปดูหน้าผลงานเผื่อรับใบประกาศ
                bootstrap.Tab.getOrCreateInstance(document.querySelector('button[data-bs-target="#tab-me"]')).show();
                document.getElementById('meBib').value = currentRunner.bib;
                loadMyResult();
            } else {
                msg = `บันทึกจุด ${cpCode} สำเร็จ ระยะ ${dist} กม. สู้ต่อไปนะคะคุณ ${currentRunner.name}`;
                speak(msg);
                alert(msg);
            }
            
            // 🔄 หลัง Alert จบ ให้ Reset หน้าจอทันทีเพื่อรอรับ BIB คนต่อไป
            cancelVerify(); 

        } catch(e) { alert("บันทึกล้มเหลว"); }
        showLoading(false);
    }

    // --- ส่วนที่เหลือ (verifyStep1, scanCP, loadMyResult ฯลฯ) ให้ใช้ของเดิมที่อาจารย์มีได้เลยครับ ---
</script>
